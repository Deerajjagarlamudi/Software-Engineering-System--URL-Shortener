name: ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
          enable-cache: true
      - run: uv sync --all-extras
      - run: uv run ruff check app tests
      - run: uv run mypy app
      - run: uv run pytest -q --cov=app --cov-report=term-missing
